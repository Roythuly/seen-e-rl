run_name: sac-pendulum-reference
seed: 1
artifacts:
  root: outputs/sac-pendulum-reference
backend:
  name: torch
  runtime_mode: train
env:
  id: Pendulum-v1
model:
  encoder:
    kind: mlp
  actor_head:
    kind: gaussian_policy
  critic_head:
    kind: twin_q
algo:
  name: sac
sampler:
  mode: replay
trainer:
  runtime:
    collection_schedule:
      mode: step
      unit: env_step
      amount: 1
      freeze_policy_during_collection: false
      warmup_env_steps: 128
    update_schedule:
      trigger_unit: env_step
      updates_per_trigger: 1
      min_ready_size: 128
      batch_size: 128
    publish_schedule:
      strategy: every_n_updates
      every_n_updates: 1
      on_actor_update_only: false
    checkpoint:
      enabled: true
    max_env_steps: 256
buffer:
  capacity: 100000
  batch_size: 128
  min_ready_size: 128
  sampling_mode: random
eval:
  selector: latest
  seeds: [1, 2, 3]
  episodes_per_seed: 2
notes: "PPO keeps the same top-level shape, but switches sampler/runtime to trajectory rollout collection and epoch/minibatch updates."
