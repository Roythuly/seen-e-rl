run_name: sac-pendulum-reference
seed: 1
backend:
  name: torch
  runtime_mode: train
env:
  id: Pendulum-v1
model:
  encoder:
    kind: mlp
  actor_head:
    kind: gaussian_policy
  critic_head:
    kind: twin_q
algo:
  name: sac
sampler:
  mode: replay
trainer:
  runtime:
    collection_schedule:
      mode: step
      unit: env_step
      amount: 1
      freeze_policy_during_collection: false
      warmup_env_steps: 1000
    update_schedule:
      trigger_unit: env_step
      updates_per_trigger: 1
      min_ready_size: 1000
    publish_schedule:
      strategy: every_n_updates
      every_n_updates: 1
      on_actor_update_only: false
buffer:
  capacity: 1000000
  batch_size: 256
  min_ready_size: 1000
  sampling_mode: random
eval:
  selector: latest
  seeds: [1, 2, 3]
  episodes_per_seed: 5
notes: "A PPO experiment keeps the same top-level shape but switches sampler/runtime config to trajectory collection and rollout updates."
