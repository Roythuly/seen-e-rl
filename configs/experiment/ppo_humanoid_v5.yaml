run_name: ppo-humanoid-v5
seed: 1
artifacts:
  root: outputs/ppo-humanoid-v5
backend:
  name: torch
  runtime_mode: train
  device: cpu
env:
  id: Humanoid-v5
model:
  encoder:
    kind: mlp
    input_dim: 348
    hidden_sizes: [256, 256]
  actor_head:
    kind: gaussian_policy
    action_dim: 17
  critic_head:
    kind: value_head
algo:
  name: ppo
sampler:
  mode: trajectory
trainer:
  runtime:
    collection_schedule:
      mode: rollout
      unit: env_step
      amount: 256
      freeze_policy_during_collection: true
    update_schedule:
      trigger_unit: collection
      updates_per_trigger: 1
      epochs: 4
      minibatch_size: 128
    publish_schedule:
      strategy: after_update
    checkpoint:
      enabled: true
    max_env_steps: 256
buffer:
  capacity: 256
  batch_size: 128
  min_ready_size: 256
  sampling_mode: fifo
eval:
  selector: latest
  seeds: [1, 2, 3]
  episodes_per_seed: 1
