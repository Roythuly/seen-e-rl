run_name: sac-humanoid-v5
seed: 1
artifacts:
  root: outputs/sac-humanoid-v5
backend:
  name: torch
  runtime_mode: train
  device: cpu
env:
  id: Humanoid-v5
model:
  encoder:
    kind: mlp
    input_dim: 348
    hidden_sizes: [256, 256]
  actor_head:
    kind: gaussian_policy
    action_dim: 17
  critic_head:
    kind: twin_q
    action_dim: 17
algo:
  name: sac
sampler:
  mode: replay
trainer:
  runtime:
    collection_schedule:
      mode: step
      unit: env_step
      amount: 1
      freeze_policy_during_collection: false
      warmup_env_steps: 128
    update_schedule:
      trigger_unit: env_step
      updates_per_trigger: 1
      min_ready_size: 128
      batch_size: 128
    publish_schedule:
      strategy: every_n_updates
      every_n_updates: 1
    checkpoint:
      enabled: true
      every_n_updates: 64
    max_env_steps: 256
buffer:
  capacity: 50000
  batch_size: 128
  min_ready_size: 128
  sampling_mode: random
eval:
  selector: latest
  seeds: [1, 2, 3]
  episodes_per_seed: 1
