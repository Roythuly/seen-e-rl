runtime:
  collection_schedule:
    mode: step
    unit: env_step
    amount: 1
    freeze_policy_during_collection: false
    warmup_env_steps: 1000
  update_schedule:
    trigger_unit: env_step
    updates_per_trigger: 1
    min_ready_size: 1000
    policy_delay: 2
  publish_schedule:
    strategy: every_n_updates
    every_n_updates: 1
    on_actor_update_only: false
  checkpoint:
    every_n_updates: 1000
    selector: latest
notes: "TD3 typically sets publish cadence to actor-update cadence; PPO replaces min_ready_size/policy_delay with epochs/minibatch_size."
